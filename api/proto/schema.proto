syntax = "proto3";

package pintour.v1;

option go_package = "github.com/irfan-ghzl/pintour-travel/api/proto;pintourv1";

import "google/protobuf/timestamp.proto";

// ─────────────────────────────────────────────────────────────────────────────
// Destination
// ─────────────────────────────────────────────────────────────────────────────
message Destination {
  string id          = 1;
  string name        = 2;
  string country     = 3;
  string description = 4;
  string image_url   = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

// ─────────────────────────────────────────────────────────────────────────────
// ItineraryItem
// ─────────────────────────────────────────────────────────────────────────────
message ItineraryItem {
  string id              = 1;
  string tour_package_id = 2;
  int32  day_number      = 3;
  string title           = 4;
  string description     = 5;
  string location        = 6;
  string start_time      = 7;
  string end_time        = 8;
  string activity_type   = 9;
  int32  sort_order      = 10;
}

// ─────────────────────────────────────────────────────────────────────────────
// TourPackage
// ─────────────────────────────────────────────────────────────────────────────
message TourPackage {
  string      id               = 1;
  string      destination_id   = 2;
  string      title            = 3;
  string      slug             = 4;
  string      description      = 5;
  double      price            = 6;
  string      price_label      = 7;
  int32       duration_days    = 8;
  int32       max_participants = 9;
  int32       min_participants = 10;
  string      package_type     = 11;
  string      cover_image_url  = 12;
  bool        is_active        = 13;
  Destination destination      = 14;
  repeated ItineraryItem itinerary = 15;
  google.protobuf.Timestamp created_at = 16;
  google.protobuf.Timestamp updated_at = 17;
}

// ─────────────────────────────────────────────────────────────────────────────
// Inquiry / Lead
// ─────────────────────────────────────────────────────────────────────────────
message Inquiry {
  string  id              = 1;
  string  full_name       = 2;
  string  email           = 3;
  string  phone           = 4;
  string  destination     = 5;
  string  tour_package_id = 6;
  int32   num_people      = 7;
  double  budget          = 8;
  int32   duration_days   = 9;
  string  departure_date  = 10;
  string  notes           = 11;
  string  status          = 12;
  string  assigned_to     = 13;
  string  wa_link         = 14;
  google.protobuf.Timestamp created_at = 15;
  google.protobuf.Timestamp updated_at = 16;
}

// ─────────────────────────────────────────────────────────────────────────────
// QuotationItem
// ─────────────────────────────────────────────────────────────────────────────
message QuotationItem {
  string id           = 1;
  string quotation_id = 2;
  string description  = 3;
  string category     = 4;
  int32  quantity     = 5;
  double unit_price   = 6;
  double total_price  = 7;
}

// ─────────────────────────────────────────────────────────────────────────────
// Quotation
// ─────────────────────────────────────────────────────────────────────────────
message Quotation {
  string  id             = 1;
  string  inquiry_id     = 2;
  string  created_by     = 3;
  string  title          = 4;
  string  customer_name  = 5;
  string  customer_email = 6;
  string  customer_phone = 7;
  string  valid_until    = 8;
  double  total_price    = 9;
  string  notes          = 10;
  string  status         = 11;
  string  pdf_url        = 12;
  repeated QuotationItem items = 13;
  google.protobuf.Timestamp created_at = 14;
  google.protobuf.Timestamp updated_at = 15;
}

// ─────────────────────────────────────────────────────────────────────────────
// User
// ─────────────────────────────────────────────────────────────────────────────
message User {
  string id         = 1;
  string name       = 2;
  string email      = 3;
  string role       = 4;
  bool   is_active  = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

// ─────────────────────────────────────────────────────────────────────────────
// Request / Response wrappers
// ─────────────────────────────────────────────────────────────────────────────
message CreateInquiryRequest {
  string full_name      = 1;
  string email          = 2;
  string phone          = 3;
  string destination    = 4;
  string tour_package_id = 5;
  int32  num_people     = 6;
  double budget         = 7;
  int32  duration_days  = 8;
  string departure_date = 9;
  string notes          = 10;
}

message CreateInquiryResponse {
  Inquiry inquiry = 1;
  string  wa_link = 2;
}

message ListTourPackagesRequest {
  int32 page     = 1;
  int32 per_page = 2;
}

message ListTourPackagesResponse {
  repeated TourPackage packages = 1;
  int64               total    = 2;
}
